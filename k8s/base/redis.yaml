apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: hack-for-facts
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: bitnami/redis:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: ALLOW_EMPTY_PASSWORD
              value: "no"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: REDIS_PASSWORD
            - name: REDIS_AOF_ENABLED
              value: "no"
            - name: REDIS_EXTRA_FLAGS
              value: "--maxmemory 512mb --maxmemory-policy allkeys-lru --save ''"
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            exec:
              command: ["sh", "-c", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping | grep PONG"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping | grep PONG"]
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: redis-data
              mountPath: /bitnami/redis/data
            - name: redis-tmp
              mountPath: /opt/bitnami/redis/tmp
      volumes:
        - name: redis-data
          emptyDir:
            sizeLimit: 1Gi
        - name: redis-tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: hack-for-facts
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
