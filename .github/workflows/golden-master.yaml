name: Golden Master Tests

on:
  # Nightly schedule at 3:00 AM UTC
  schedule:
    - cron: '0 3 * * *'

  # Triggered after Dev Branch Pipeline completes (waits for build & push)
  workflow_run:
    workflows: ['Dev Branch Pipeline']
    types:
      - completed
    branches:
      - dev

  # Manual trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'both'
        type: choice
        options:
          - dev
          - prod
          - both
      skip_delay:
        description: 'Skip ArgoCD deployment delay'
        required: false
        default: false
        type: boolean
      run_security:
        description: 'Run report-only nightly security checks'
        required: false
        default: false
        type: boolean

# Don't cancel in-progress runs for scheduled jobs
concurrency:
  group: golden-master-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'workflow_run' }}

env:
  # Default API URLs (can be overridden via GitHub secrets)
  DEV_API_URL: ${{ secrets.GM_DEV_API_URL || 'https://dev-api.transparenta.eu/graphql' }}
  PROD_API_URL: ${{ secrets.GM_PROD_API_URL || 'https://api.transparenta.eu/graphql' }}
  # Time to wait for ArgoCD to deploy after workflow completes (in seconds)
  ARGOCD_DEPLOY_DELAY: 180

jobs:
  golden-master-dev:
    name: Golden Master (Dev)
    runs-on: ubuntu-latest
    # Run for: schedule, workflow_run (after dev deploy), or manual with dev/both
    # Skip if the triggering workflow failed
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && (inputs.environment == 'dev' || inputs.environment == 'both'))
    # Non-blocking: continue even if tests fail
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Wait for ArgoCD deployment
        if: github.event_name == 'workflow_run'
        run: |
          echo "Waiting $ARGOCD_DEPLOY_DELAY seconds for ArgoCD to deploy the new version..."
          sleep $ARGOCD_DEPLOY_DELAY
          echo "Delay complete, proceeding with tests"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Golden Master Tests (Dev)
        id: gm-test-dev
        env:
          TEST_GM_API_URL: ${{ env.DEV_API_URL }}
        run: |
          echo "Testing against: $TEST_GM_API_URL"
          pnpm vitest run tests/golden-master --config vitest.gm.config.ts 2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: golden-master-dev-results-${{ github.run_id }}
          path: test-output.txt
          retention-days: 7

  golden-master-prod:
    name: Golden Master (Prod)
    runs-on: ubuntu-latest
    # Run for: schedule, or manual with prod/both
    # Note: workflow_run events only test dev, not prod
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (inputs.environment == 'prod' || inputs.environment == 'both'))
    # Non-blocking: continue even if tests fail
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Golden Master Tests (Prod)
        id: gm-test-prod
        env:
          TEST_GM_API_URL: ${{ env.PROD_API_URL }}
        run: |
          echo "Testing against: $TEST_GM_API_URL"
          pnpm vitest run tests/golden-master --config vitest.gm.config.ts 2>&1 | tee test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: golden-master-prod-results-${{ github.run_id }}
          path: test-output.txt
          retention-days: 7

  security-nightly:
    name: Nightly Security Checks
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_security == true)
    outputs:
      status: ${{ steps.security-status.outputs.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run report-only security scans
        id: security-scans
        run: |
          mkdir -p security-results "${{ github.workspace }}/.trivycache"

          set +e

          pnpm audit --audit-level high > security-results/pnpm-audit.txt 2>&1
          audit_exit=$?

          docker run --rm \
            -v "${{ github.workspace }}:/workdir" \
            -w /workdir \
            -v "${{ github.workspace }}/.trivycache:/root/.cache/" \
            aquasec/trivy:0.69.1 config \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format table \
            Dockerfile .github/workflows k8s > security-results/trivy-config.txt 2>&1
          trivy_exit=$?

          set -e

          {
            echo "audit_exit_code=$audit_exit"
            echo "trivy_exit_code=$trivy_exit"
          } | tee security-results/scan-metadata.txt >> "$GITHUB_OUTPUT"

      - name: Summarize security findings
        if: always()
        id: security-status
        run: |
          status="passed"
          if [ "${{ steps.security-scans.outputs.audit_exit_code }}" != "0" ] || [ "${{ steps.security-scans.outputs.trivy_exit_code }}" != "0" ]; then
            status="warnings"
          fi

          echo "status=$status" >> "$GITHUB_OUTPUT"

          echo "## Nightly Security Checks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.security-scans.outputs.audit_exit_code }}" = "0" ]; then
            echo "- ✅ pnpm audit: Passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ⚠️ pnpm audit: Warnings" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "${{ steps.security-scans.outputs.trivy_exit_code }}" = "0" ]; then
            echo "- ✅ Trivy config scan: Passed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- ⚠️ Trivy config scan: Warnings" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifacts: security-nightly-results-${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-nightly-results-${{ github.run_id }}
          path: security-results
          retention-days: 7

  # Summary job to report overall status
  summary:
    name: Golden Master Summary
    runs-on: ubuntu-latest
    needs: [golden-master-dev, golden-master-prod, security-nightly]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Golden Master Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.golden-master-dev.result }}" == "success" ]; then
            echo "- ✅ Dev environment: Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.golden-master-dev.result }}" == "failure" ]; then
            echo "- ❌ Dev environment: Failed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.golden-master-dev.result }}" == "skipped" ]; then
            echo "- ⏭️ Dev environment: Skipped" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.golden-master-prod.result }}" == "success" ]; then
            echo "- ✅ Prod environment: Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.golden-master-prod.result }}" == "failure" ]; then
            echo "- ❌ Prod environment: Failed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.golden-master-prod.result }}" == "skipped" ]; then
            echo "- ⏭️ Prod environment: Skipped" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.security-nightly.result }}" == "skipped" ]; then
            echo "- ⏭️ Security checks: Skipped" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.security-nightly.outputs.status }}" == "passed" ]; then
            echo "- ✅ Security checks: Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.security-nightly.outputs.status }}" == "warnings" ]; then
            echo "- ⚠️ Security checks: Warnings" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Security checks: Failed to run" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Note: Golden Master tests and nightly security scans are report-only checks. Failures here don't block deployments." >> $GITHUB_STEP_SUMMARY
