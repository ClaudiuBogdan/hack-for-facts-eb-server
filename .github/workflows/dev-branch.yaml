name: Dev Branch Pipeline

on:
  push:
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Validation Jobs (run in parallel)
  # ─────────────────────────────────────────────────────────────────────────────

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Check circular dependencies
        run: pnpm deps:check
      - name: Validate datasets
        run: pnpm run validate-datasets

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  # ─────────────────────────────────────────────────────────────────────────────
  # Build & Deploy (after all validations pass)
  # ─────────────────────────────────────────────────────────────────────────────

  build-push-update:
    name: Build & Deploy
    needs: [typecheck, lint, validate, test-unit, test-integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

      - name: Verify distroless runtime base
        run: |
          runtime_base="$(sed -n 's/^ARG DISTROLLESS_BASE=//p' Dockerfile)"
          if [ -z "${runtime_base}" ]; then
            echo "Failed to resolve DISTROLLESS_BASE from Dockerfile" >&2
            exit 1
          fi

          cosign verify "${runtime_base}" \
            --certificate-oidc-issuer https://accounts.google.com \
            --certificate-identity keyless@distroless.iam.gserviceaccount.com

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Get Secrets from Bitwarden
        uses: bitwarden/sm-action@v1
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            9b3cdd24-396a-457e-8d56-b2d600dda041 > DOCKER_REGISTRY_URL
            c9992fd1-98c0-4e2c-a4e5-b2d600dd3367 > DOCKER_USERNAME
            ca2abaf7-e7f5-40d5-a06a-b2d600dd4ba9 > DOCKER_PASSWORD

      - name: Normalize Registry URL
        run: |
          url="${DOCKER_REGISTRY_URL#https://}"
          url="${url#http://}"
          echo "DOCKER_REGISTRY=${url}" >> $GITHUB_ENV

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ env.DOCKER_REGISTRY }}/hack-for-facts-eb-server:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        run: |
          mkdir -p "${{ github.workspace }}/.trivycache"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}/.trivycache:/root/.cache/" \
            aquasec/trivy:0.69.1 image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity CRITICAL,HIGH \
            "${{ env.DOCKER_REGISTRY }}/hack-for-facts-eb-server:${{ github.sha }}"

      - name: Push Docker Image
        run: |
          docker push ${{ env.DOCKER_REGISTRY }}/hack-for-facts-eb-server:${{ github.sha }}

      - name: Update Image Tag and SHA in Kustomization
        run: |
          cd ./k8s/base
          kustomize edit set image ${{ env.DOCKER_REGISTRY }}/hack-for-facts-eb-server=${{ env.DOCKER_REGISTRY }}/hack-for-facts-eb-server:${{ github.sha }}
          sed -i "s| image-sha: .*| image-sha: ${{ github.sha }}|" kustomization.yaml

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add k8s/base/kustomization.yaml
          git diff --staged --quiet || HUSKY=0 git commit -m "ci(image): Update dev image tag to ${{ github.sha }}"
          git push origin dev
